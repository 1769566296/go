<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿烽留言板</title>
    <!-- 网站图标 -->
    <link rel="icon" href="https://pic2.ziyuan.wang/user/Ayang/2026/03/icon_f312f1cc70b04.ico">
    <link rel="stylesheet" href="./css/home.css">
    <!-- Supabase SDK 必须放在style上方，不能注释 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .box {
            max-width: 90%;
            margin: 30px auto;
            font-family: "楷体";
        }
        .form-item {
            margin: 15px 0;
        }
        label {
            display: block;
            font-size: 18px;
            margin-bottom: 6px;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        button {
            padding: 10px 30px;
            background: #6625cc;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
        }
        button:hover {
            background: #451896;
        }
        /* 留言名字 */
        .msg-item {
            border: 1px solid #ac8655;
            border-radius: 8px;
            padding: 12px;
            margin: 12px 0;
            color: #a37e4c;
        }
        /* 留言内容 */
        .msg-name {
            font-weight: bold;
            color: #6625cc;
        }
        /* 留言时间 */
        .msg-time {
            font-size: 12px;
            color: #888;
            margin-left: 10px;
        }
        /* 置顶标签样式 */
.msg-top-tag {
    color: #ff3333;
    border: 1px solid #ff3333;
    font-size: 12px;
    padding: 2px 6px;
    border-radius: 4px;
    margin-right: 8px;
}
/* 点赞按钮样式 */
.like-btn {
    margin-top: 8px;
    background: #fff;
    color: #6625cc;
    border: 1px solid #6625cc;
    padding: 4px 12px;
    font-size: 14px;
}
.like-btn:hover {
    background: #f3eeff;
}
    </style>
</head>
<body>
    
    <div>
        <h1>留言板</h1>
        <h3>欢迎大家留言</h3>
    </div>
<a href="../index.html">←<返回首页</a>
            <hr style="margin:20px 0;">

        <!-- 留言提交表单区域 -->
        <div class="form">
            <div class="form-item">
                <label>你的昵称</label>
                <input type="text" id="username" placeholder="输入你的留言名称">
            </div>
            <div class="form-item">
                <label>留言内容</label>
                <textarea id="content" placeholder="写下想说的话..."></textarea>
            </div>
            <button id="submitBtn">提交留言</button>
        </div>
        <!-- ↓添加弹性盒子 -->
        <div style="display:flex;justify-content:space-between;align-items:center;">
            <!-- 管理面板入口 -->
            <a href="./admin/MessageBoard_admin.html" style="font-size:16px;font-weight:bold;">留言管理面板</a>
        </div>
        <hr style="margin:30px 0;">
        <h2>全部云端留言</h2>
        <div id="msgList">加载中...</div>
    </div>

<script>
// 1. Supabase 配置信息
const SUPABASE_URL = "https://vdmuxkapemtopjmwnpvb.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_GUySM7Ho51-9XwDPn_UJjw_Bgl0nxJ0";

// 2. 创建数据库实例（sb 避免和全局supabase重名报错）
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// 3. 获取页面DOM元素
const username = document.getElementById('username');
const content = document.getElementById('content');
const submitBtn = document.getElementById('submitBtn');
const msgList = document.getElementById('msgList');

// 4. 从云端读取并渲染留言列表
async function renderMsg() {
    msgList.innerText = "加载中...";
    // 修复：把 supabase 改为 sb
    const { data, error } = await sb
        .from('messages')
        .select('*')
        .order('created_at', { ascending: false });

    if (error) {
        msgList.innerHTML = `<p style="color:red">加载失败：${error.message}</p>`;
        return;
    }
    if (data.length === 0) {
        msgList.innerHTML = "<p>暂无留言</p>";
        return;
    }
    msgList.innerHTML = "";
    data.forEach(item => {
        const div = document.createElement('div');
        div.className = 'msg-item';
        const time = new Date(item.created_at).toLocaleString();
        // 循环渲染留言 html
    div.innerHTML = `
        <div>
            ${item.is_top ? '<span class="msg-top-tag">置顶</span>' : ''}
            <span class="msg-name">${item.nickname}</span>
            <span class="msg-time">${time}</span>
        </div>
        <p>${item.content}</p>
        <button class="like-btn" data-id="${item.id}" data-like="${item.like_count}">
            👍 点赞 <span class="like-num">${item.like_count}</span>
        </button>
    `;
        
        msgList.appendChild(div);
    // 给所有点赞按钮绑定点击事件
    document.querySelectorAll('.like-btn').forEach(btn => {
        btn.onclick = async function () {
            const msgId = this.dataset.id;
            const oldLikeNum = Number(this.dataset.like);
            const newLikeNum = oldLikeNum + 1;
            // 更新云端点赞数字
            const { error } = await sb
                .from('messages')
                .update({ like_count: newLikeNum })
                .eq('id', msgId);
            // 更新成功后刷新留言列表
            if (!error) renderMsg();
        }
    })
    })
}

// 页面加载完成自动读取留言
renderMsg();

// 5. 提交留言按钮点击事件
submitBtn.onclick = async function(){
    // 锁定按钮[避免重复提交]
    submitBtn.disabled = true;
    submitBtn.innerText = "提交中...";
    
    let nameVal = username.value.trim();
    let textVal = content.value.trim();

    // 简单表单校验
    if(!nameVal){
        alert('请填写昵称！');
        return;
    }
    if(!textVal){
        alert('请填写留言内容！');
        return;
    }

    // 修复：把 supabase 改为 sb
    const { error } = await sb
        .from('messages')
        .insert([{ nickname: nameVal, content: textVal }]);

    if(error){
        alert("提交失败："+error.message);
        // 失败后解锁按钮，不然就锁死了
        submitBtn.disabled = false;
        submitBtn.innerText = "提交留言";
        return;
    }
    alert('留言提交成功！');
    // 清空输入框并刷新留言列表
    username.value = '';
    content.value = '';
    renderMsg();
    // 解锁按钮
    submitBtn.disabled = false;
    submitBtn.innerText = "提交留言";
}
</script>
</body>
</html>
